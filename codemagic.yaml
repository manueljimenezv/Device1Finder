workflows:
  ios-build:
    name: iOS Build
    instance_type: mac_mini_m1
    environment:
      xcode: latest
    scripts:
      - name: Build unsigned IPA
        script: |
          xcodebuild \
            -project Device1Finder.xcodeproj \
            -scheme Device1Finder \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build
          mkdir -p $CM_BUILD_DIR/artifacts/Payload
          cp -r build/Build/Products/Release-iphoneos/Device1Finder.app $CM_BUILD_DIR/artifacts/Payload/
          cp Device1Finder/Info.plist $CM_BUILD_DIR/artifacts/Payload/Device1Finder.app/Info.plist
          cd $CM_BUILD_DIR/artifacts
          zip -r $CM_BUILD_DIR/artifacts/Device1Finder.ipa Payload/
    artifacts:
      - $CM_BUILD_DIR/artifacts/Device1Finder.ipa
