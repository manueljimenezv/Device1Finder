workflows:
  ios-build:
    name: iOS Build
    instance_type: mac_mini_m1
    environment:
      xcode: latest
    scripts:
      - name: Build unsigned IPA
        script: |
          xcodebuild \
            -project Device1Finder.xcodeproj \
            -scheme Device1Finder \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/Device1Finder.app Payload/
          zip -r Device1Finder.ipa Payload/
